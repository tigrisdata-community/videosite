# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  GREETING: Hello, world!

tasks:
  generate:
    desc: Generate assets
    cmds:
      - go generate ./...
  run:
    deps: [generate]
    desc: Run the program in development mode
    cmds:
      - go run ./cmd/videosite
    aliases: [default]
  db:
    desc: SQLite REPL
    cmds:
      - sqlite3 ./var/data.db

  encoder:image:
    desc: Build and push the encoder Docker image
    vars:
      TAG: '{{.TAG | default "latest"}}'
      REGISTRY: '{{.REGISTRY | default "reg.xeiaso.net/xeserv"}}'
    cmds:
      - docker build -f docker/encoder.Dockerfile -t {{.REGISTRY}}/videosite-encoder:{{.TAG}} .
      - docker push {{.REGISTRY}}/videosite-encoder:{{.TAG}}
